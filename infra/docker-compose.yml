services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: office_detective_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-detective}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-detective_secret}
      POSTGRES_DB: ${POSTGRES_DB:-office_detective}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-detective} -d ${POSTGRES_DB:-office_detective}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: office_detective_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-detective_graph}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - '${NEO4J_HTTP_PORT:-7474}:7474'
      - '${NEO4J_BOLT_PORT:-7687}:7687'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: office_detective_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    profiles: ['app']
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: office_detective_api
    restart: unless-stopped
    environment:
      APP_ENV: development
      APP_DEBUG: 'true'
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    ports:
      - '${API_PORT:-8000}:8000'
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    profiles: ['app']
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: office_detective_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      API_URL_INTERNAL: http://api:8000
      NEXT_TELEMETRY_DISABLED: '1'
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
